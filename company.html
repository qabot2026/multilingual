<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="dfchat-api-base-url" content="">
  <title>Company Chat</title>
  <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
  <link rel="stylesheet" href="./static/company.css?v=20260424-33">
</head>
<body>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search || "");
        if (params.get("dfchatDebug") === "1" || params.get("companyDebug") === "1") {
          window.__dfchatDebug = true;
          localStorage.setItem("dfchat_debug_footer", "1");
          localStorage.setItem("dfchat_debug_freeze", "0");
        }
      } catch (e) {}
    })();
  </script>
  <section id="dfchat-contact-form" class="dfchat-contact-form" aria-hidden="true">
    <div class="dfchat-contact-form__card">
      <div class="dfchat-contact-form__header">
        <div>
          <h2 class="dfchat-contact-form__title" data-i18n="contactFormTitle">Contact Us</h2>
          <p class="dfchat-contact-form__subtitle" data-i18n="contactFormSubtitle">Share your details and we will contact you.</p>
        </div>
        <button id="dfchat-contact-form-close" class="dfchat-contact-form__icon-button" type="button" aria-label="Close contact form" data-i18n-aria-label="closeContactFormAria">x</button>
      </div>
      <form id="dfchat-contact-form-fields" class="dfchat-contact-form__fields dfchat-contact-form__fields--stacked">
        <div id="dfchat-contact-form-inputs" class="dfchat-contact-form__inputs" data-i18n-aria-label="contactFormTitle"></div>
        <p id="dfchat-contact-form-status" class="dfchat-contact-form__status" aria-live="polite"></p>
        <button id="dfchat-contact-form-submit" class="dfchat-contact-form__submit" type="submit" data-i18n="submitButton">Submit</button>
      </form>
    </div>
  </section>
  <div id="dfchat-hard-action-bar" aria-label="Chat footer actions" hidden>
    <div id="dfchat-hard-language-wrap">
      <button id="dfchat-hard-language-btn" type="button" aria-label="Language" title="Language">🌐</button>
      <div id="dfchat-hard-language-menu" role="menu" aria-label="Language options">
        <button type="button" data-lang="en">English</button>
        <button type="button" data-lang="hi">Hindi</button>
        <button type="button" data-lang="mr">Marathi</button>
      </div>
    </div>
    <button id="dfchat-hard-restart-btn" type="button" aria-label="Restart" title="Restart">↻</button>
  </div>
  <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
  <script src="./static/company.config.js?v=20260424-33"></script>
  <script src="./static/company.js?v=20260424-33"></script>
</body>
</html>

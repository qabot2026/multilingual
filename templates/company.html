<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="artemis-api-base-url" content="https://artemisquality-788207962975.us-central1.run.app">
  <title>Artemis Hospital</title>
  <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
  <link rel="stylesheet" href="/static/artemis.css">
</head>
<body>
  <section id="contact-form" class="contact-form" aria-hidden="true">
    <div class="contact-form__card">
      <div class="contact-form__header">
        <div>
          <h2 class="contact-form__title" data-i18n="contactFormTitle">Contact Us</h2>
          <p class="contact-form__subtitle" data-i18n="contactFormSubtitle">Share your details and we will contact you.</p>
        </div>
        <button id="contact-form-close" class="contact-form__icon-button" type="button" aria-label="Close contact form" data-i18n-aria-label="closeContactFormAria">x</button>
      </div>
      <form id="contact-form-fields" class="contact-form__fields">
        <input id="contact-name" name="name" type="text" placeholder="Name" autocomplete="name" data-i18n-placeholder="namePlaceholder" required>
        <input id="contact-mobile" name="mobile" type="tel" placeholder="Mobile number" autocomplete="tel" inputmode="tel" data-i18n-placeholder="mobilePlaceholder" required>
        <input id="contact-email" name="email" type="email" placeholder="Email" autocomplete="email" data-i18n-placeholder="emailPlaceholder" required>
        <textarea id="contact-message" name="message" rows="4" placeholder="How can we help?" data-i18n-placeholder="messagePlaceholder" required></textarea>
        <p id="contact-form-status" class="contact-form__status" aria-live="polite"></p>
        <button id="contact-form-submit" class="contact-form__submit" type="submit" data-i18n="submitButton">Submit</button>
      </form>
    </div>
  </section>
  <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
  <script src="/static/artemis.js"></script>
</body>
</html>
